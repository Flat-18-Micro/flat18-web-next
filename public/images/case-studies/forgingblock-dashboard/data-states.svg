<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#f8fafc" />
  <text x="60" y="60" font-family="Arial, sans-serif" font-size="18" fill="#111827">Data states</text>
  <text x="60" y="84" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Loading, empty, and error treatments keep the page calm and informative.</text>

  <rect x="60" y="110" width="320" height="240" rx="16" fill="#ffffff" stroke="#e5e7eb" />
  <text x="84" y="144" font-family="Arial, sans-serif" font-size="13" fill="#111827">Loading</text>
  <rect x="84" y="170" width="260" height="14" rx="6" fill="#e5e7eb" />
  <rect x="84" y="194" width="220" height="14" rx="6" fill="#e5e7eb" />
  <rect x="84" y="218" width="250" height="14" rx="6" fill="#e5e7eb" />

  <rect x="440" y="110" width="320" height="240" rx="16" fill="#ffffff" stroke="#e5e7eb" />
  <text x="464" y="144" font-family="Arial, sans-serif" font-size="13" fill="#111827">Empty state</text>
  <rect x="560" y="184" width="80" height="80" rx="40" fill="#f3f4f6" />
  <text x="468" y="286" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">No payments match your filters.</text>

  <rect x="820" y="110" width="320" height="240" rx="16" fill="#ffffff" stroke="#e5e7eb" />
  <text x="844" y="144" font-family="Arial, sans-serif" font-size="13" fill="#111827">Error</text>
  <rect x="844" y="174" width="260" height="58" rx="10" fill="#fee2e2" />
  <text x="862" y="206" font-family="Arial, sans-serif" font-size="12" fill="#991b1b">Unable to load the payments list.</text>
</svg>
