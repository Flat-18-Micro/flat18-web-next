  <rect x="330" y="530" width="810" height="180" rx="12" fill="#ffffff" stroke="#d0d5dd"/>
  <text x="350" y="560" class="label">Holdings table</text>
  <rect x="350" y="580" width="760" height="24" rx="6" fill="#f2f4f7"/>
  <rect x="350" y="615" width="760" height="24" rx="6" fill="#f2f4f7"/>
  <rect x="350" y="650" width="760" height="24" rx="6" fill="#f2f4f7"/>
