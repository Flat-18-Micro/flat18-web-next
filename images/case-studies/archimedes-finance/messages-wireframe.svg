  <rect x="980" y="684" width="110" height="32" rx="16" fill="#111827"/>
  <text x="1012" y="705" fill="#ffffff" font-family="Space Grotesk, Arial, sans-serif" font-size="12" font-weight="700">Send</text>
</svg>
