<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <style>
      .label { font: 600 12px 'Space Grotesk', Arial, sans-serif; fill: #5b6472; }
      .title { font: 700 18px 'Space Grotesk', Arial, sans-serif; fill: #1f2937; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#ffffff"/>
  <rect x="40" y="40" width="1120" height="720" rx="16" fill="#f7f7f9" stroke="#d0d5dd"/>
  <text x="80" y="100" class="title">Messages</text>

  <rect x="80" y="130" width="300" height="580" rx="12" fill="#ffffff" stroke="#d0d5dd"/>
  <rect x="100" y="160" width="260" height="40" rx="8" fill="#f2f4f7"/>
  <rect x="100" y="210" width="260" height="40" rx="8" fill="#f2f4f7"/>
  <rect x="100" y="260" width="260" height="40" rx="8" fill="#f2f4f7"/>
  <rect x="100" y="310" width="260" height="40" rx="8" fill="#f2f4f7"/>

  <rect x="410" y="130" width="710" height="520" rx="12" fill="#ffffff" stroke="#d0d5dd"/>
  <text x="440" y="170" class="label">Conversation</text>
  <rect x="440" y="200" width="300" height="60" rx="10" fill="#f2f4f7"/>
  <rect x="600" y="280" width="300" height="60" rx="10" fill="#e8f5f2"/>
  <rect x="440" y="360" width="280" height="60" rx="10" fill="#f2f4f7"/>
