<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 600 22px 'IBM Plex Sans', Arial, sans-serif; fill: #e7ecef; }
      .label { font: 500 14px 'IBM Plex Sans', Arial, sans-serif; fill: #a7b0ba; }
      .value { font: 700 18px 'IBM Plex Mono', Menlo, monospace; fill: #f6f8fa; }
      .card { fill: #171b22; stroke: #2a313a; stroke-width: 1; rx: 16; }
      .chip { fill: #1b2028; stroke: #2a313a; stroke-width: 1; }
      .grid { stroke: #20252d; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="#0f1115"/>
  <rect x="0" y="0" width="1200" height="64" fill="#141821"/>
  <text x="24" y="40" class="title">Mining Performance</text>

  <rect x="24" y="96" width="1152" height="136" class="card"/>
  <text x="48" y="132" class="label">Mining Sites</text>
  <rect x="48" y="150" width="220" height="40" class="chip" rx="12"/>
  <text x="64" y="176" class="label">All Farms</text>
  <rect x="288" y="150" width="220" height="40" class="chip" rx="12"/>
  <text x="304" y="176" class="label">Camcy Icora</text>
  <rect x="528" y="150" width="220" height="40" class="chip" rx="12"/>
  <text x="544" y="176" class="label">Iros</text>

  <rect x="24" y="252" width="1152" height="300" class="card"/>
  <text x="48" y="286" class="label">Live Mining Gauges</text>

  <circle cx="210" cy="400" r="90" fill="none" stroke="#20252d" stroke-width="16"/>
  <circle cx="210" cy="400" r="90" fill="none" stroke="#45d0c1" stroke-width="16" stroke-dasharray="380 200" transform="rotate(-90 210 400)"/>
  <text x="160" y="410" class="value">28.4 TH/s</text>
  <text x="170" y="436" class="label">Project</text>

  <circle cx="520" cy="400" r="90" fill="none" stroke="#20252d" stroke-width="16"/>
  <circle cx="520" cy="400" r="90" fill="none" stroke="#f4b44d" stroke-width="16" stroke-dasharray="300 200" transform="rotate(-90 520 400)"/>
  <text x="470" y="410" class="value">2.1 TH/s</text>
  <text x="480" y="436" class="label">Your Share</text>

  <circle cx="830" cy="400" r="90" fill="none" stroke="#20252d" stroke-width="16"/>
  <circle cx="830" cy="400" r="90" fill="none" stroke="#8da3ff" stroke-width="16" stroke-dasharray="260 200" transform="rotate(-90 830 400)"/>
  <text x="780" y="410" class="value">$146k</text>
  <text x="790" y="436" class="label">Daily Rev</text>

  <rect x="24" y="572" width="1152" height="120" class="card"/>
  <text x="48" y="606" class="label">Site Breakdown</text>
  <line x1="48" y1="628" x2="1128" y2="628" class="grid"/>
  <text x="48" y="654" class="label">Camcy Icora</text>
  <text x="400" y="654" class="label">12.1 TH/s</text>
  <text x="640" y="654" class="label">$62k/day</text>
  <text x="900" y="654" class="label">Stable</text>
</svg>
