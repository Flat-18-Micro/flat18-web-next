<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f4f4f4; }
      .frame { fill: #ffffff; stroke: #cfcfcf; stroke-width: 2; rx: 12; }
      .bar { fill: #e6e6e6; }
      .text { font: 600 16px Arial, sans-serif; fill: #6a6a6a; }
      .label { font: 500 12px Arial, sans-serif; fill: #8a8a8a; }
    </style>
  </defs>

  <rect width="1200" height="720" class="bg"/>
  <rect x="20" y="20" width="1160" height="680" class="frame"/>

  <rect x="40" y="40" width="1120" height="48" class="bar" rx="8"/>
  <text x="60" y="70" class="text">Mining Header</text>

  <rect x="40" y="110" width="1120" height="80" class="bar" rx="8"/>
  <text x="60" y="150" class="label">Site Filters</text>

  <rect x="40" y="210" width="1120" height="260" class="bar" rx="8"/>
  <text x="60" y="240" class="label">Gauge Cluster</text>

  <rect x="40" y="490" width="1120" height="180" class="bar" rx="8"/>
  <text x="60" y="520" class="label">Site Breakdown Table</text>
</svg>
