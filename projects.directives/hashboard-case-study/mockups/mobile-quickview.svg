<svg width="420" height="820" viewBox="0 0 420 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f4f4f4; }
      .phone { fill: #ffffff; stroke: #cfcfcf; stroke-width: 2; rx: 24; }
      .bar { fill: #e6e6e6; }
      .text { font: 600 14px Arial, sans-serif; fill: #6a6a6a; }
      .label { font: 500 11px Arial, sans-serif; fill: #8a8a8a; }
    </style>
  </defs>

  <rect width="420" height="820" class="bg"/>
  <rect x="40" y="20" width="340" height="780" class="phone"/>

  <rect x="70" y="60" width="280" height="42" class="bar" rx="12"/>
  <text x="90" y="86" class="text">Hashboard</text>

  <rect x="70" y="120" width="280" height="120" class="bar" rx="12"/>
  <text x="90" y="150" class="label">Summary Card</text>

  <rect x="70" y="260" width="280" height="120" class="bar" rx="12"/>
  <text x="90" y="290" class="label">Mining Snapshot</text>

  <rect x="70" y="400" width="280" height="120" class="bar" rx="12"/>
  <text x="90" y="430" class="label">Treasury Snapshot</text>

  <rect x="70" y="540" width="280" height="120" class="bar" rx="12"/>
  <text x="90" y="570" class="label">Governance Snapshot</text>

  <rect x="70" y="680" width="280" height="60" class="bar" rx="12"/>
  <text x="90" y="715" class="label">Primary Action</text>
</svg>
