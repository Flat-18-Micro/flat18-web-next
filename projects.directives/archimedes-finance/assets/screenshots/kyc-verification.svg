<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .title { font: 700 20px 'Space Grotesk', Arial, sans-serif; fill: #0b1e3b; }
      .subtitle { font: 600 14px 'Space Grotesk', Arial, sans-serif; fill: #4b5b73; }
      .label { font: 600 11px 'Space Grotesk', Arial, sans-serif; fill: #7b8798; text-transform: uppercase; }
      .value { font: 600 12px 'Space Grotesk', Arial, sans-serif; fill: #2f3b4c; }
      .small { font: 500 11px 'Space Grotesk', Arial, sans-serif; fill: #6b778c; }
      .badge { font: 700 10px 'Space Grotesk', Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="#f5f7fa"/>
  <rect x="0" y="0" width="1440" height="64" fill="#0b1e3b"/>
  <text x="24" y="40" fill="#ffffff" font-family="Space Grotesk, Arial, sans-serif" font-size="14" font-weight="700">Plains North Capital</text>

  <rect x="0" y="64" width="240" height="836" fill="#0f2a4d"/>
  <text x="24" y="110" fill="#d9e2f2" font-family="Space Grotesk, Arial, sans-serif" font-size="13" font-weight="600">Dashboard</text>
  <text x="24" y="148" fill="#d9e2f2" font-family="Space Grotesk, Arial, sans-serif" font-size="13" font-weight="600">Tokenisation</text>
  <text x="24" y="186" fill="#ffffff" font-family="Space Grotesk, Arial, sans-serif" font-size="13" font-weight="700">KYC Verification</text>
  <text x="24" y="224" fill="#d9e2f2" font-family="Space Grotesk, Arial, sans-serif" font-size="13" font-weight="600">Messages</text>

  <text x="272" y="120" class="title">KYC Verification</text>
  <text x="272" y="145" class="subtitle">Identity check and document validation</text>

  <rect x="260" y="180" width="680" height="540" rx="16" fill="#ffffff"/>
  <text x="280" y="210" class="subtitle">Live Selfie Capture</text>
  <rect x="280" y="230" width="640" height="420" rx="16" fill="#0f2a4d"/>
  <rect x="320" y="270" width="220" height="280" rx="110" fill="#193a63"/>
  <rect x="560" y="280" width="300" height="260" rx="18" fill="#132b4f"/>
  <text x="580" y="330" fill="#d9e2f2" font-family="Space Grotesk, Arial, sans-serif" font-size="12" font-weight="600">Align your face</text>
  <text x="580" y="355" fill="#94a3b8" font-family="Space Grotesk, Arial, sans-serif" font-size="11" font-weight="500">Ensure good lighting and remove glasses</text>
  <rect x="280" y="670" width="200" height="36" rx="18" fill="#18a999"/>
  <text x="320" y="694" class="badge">CAPTURE</text>
  <rect x="490" y="670" width="180" height="36" rx="18" fill="#e8f5f2"/>
  <text x="525" y="694" class="value">Retake</text>

  <rect x="960" y="180" width="460" height="540" rx="16" fill="#ffffff"/>
  <text x="980" y="210" class="subtitle">Document Upload</text>
  <text x="980" y="240" class="label">Passport or national ID</text>
  <rect x="980" y="255" width="420" height="140" rx="12" fill="#f5f7fa"/>
  <text x="1000" y="330" class="value">Drag and drop your document</text>

  <text x="980" y="420" class="label">Verification Steps</text>
  <rect x="980" y="435" width="420" height="44" rx="10" fill="#e8f5f2"/>
  <text x="1000" y="463" class="value">1. Identity document uploaded</text>
  <rect x="980" y="485" width="420" height="44" rx="10" fill="#e8f5f2"/>
  <text x="1000" y="513" class="value">2. Face match detected</text>
  <rect x="980" y="535" width="420" height="44" rx="10" fill="#f5f7fa"/>
  <text x="1000" y="563" class="value">3. Manual review pending</text>

  <rect x="980" y="600" width="420" height="90" rx="12" fill="#fdf3e7"/>
  <text x="1000" y="632" class="value">Estimated completion</text>
  <text x="1000" y="655" class="title">4-6 hours</text>
  <text x="1000" y="678" class="small">We will notify you once verified</text>
</svg>
