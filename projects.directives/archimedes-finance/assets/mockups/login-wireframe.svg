      .label { font: 600 12px 'Space Grotesk', Arial, sans-serif; fill: #5b6472; }
      .title { font: 700 20px 'Space Grotesk', Arial, sans-serif; fill: #1f2937; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#ffffff"/>
  <rect x="120" y="120" width="960" height="560" rx="18" fill="#f7f7f9" stroke="#d0d5dd"/>
  <rect x="180" y="170" width="300" height="32" rx="6" fill="#ffffff" stroke="#cdd5df"/>
  <text x="200" y="192" class="label">Plains North Capital</text>

  <text x="200" y="260" class="title">Sign in</text>
